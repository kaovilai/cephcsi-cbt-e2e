updates:
- directory: /
  groups:
    csi:
      patterns:
      - github.com/kubernetes-csi/*
    ginkgo:
      patterns:
      - github.com/onsi/*
    k8s:
      patterns:
      - k8s.io/*
  package-ecosystem: gomod
  schedule:
    interval: weekly
- directory: /
  ignore:
  - dependency-name: "github/gh-aw-actions/**" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  package-ecosystem: github-actions
  schedule:
    interval: weekly
version: 2
